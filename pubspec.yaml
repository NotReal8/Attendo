name: face_attendance
description: Face recognition attendance system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  onnxruntime: ^1.3.0
  camera: ^0.10.5+9
  image: ^4.2.0
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  csv: ^6.0.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  path: ^1.9.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  device_info_plus: ^10.0.0
  file_picker: ^8.0.0
  excel: ^4.0.6
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/models/best_model_quantized.onnx